version: '3.9'
services:
 
  # ── Node.js API ─────────────────────────────────
  api:
    build: .
    ports: ['3004:3003']
    container_name: masterbackend_api
    restart: always
    env_file:
      - .env
    # environment:
    #   DB_HOST:     db
    #   DB_USER:     root
    #   DB_PASS:     secret
    #   DB_NAME:     blog_db
    #   REDIS_HOST:  cache
    #   JWT_SECRET:  supersecret
    depends_on:
      db:    { condition: service_healthy }
 
  # ── MySQL ─────────────────────────────────
  db:
    image: mysql:8
    container_name: masterbackend_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE:      masterbackend_db
    ports: ['3332:3306']
    volumes: ['mysql_data:/var/lib/mysql']
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      retries: 5

volumes:
  mysql_data:

